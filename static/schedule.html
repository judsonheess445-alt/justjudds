<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Estimate | Just Judds</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0f0a; --bg2: #111a11; --card: #151f15; --card2: #1a281a;
    --accent: #7fcc3f; --accent-dim: #5a9a2a; --glow: rgba(127,204,63,0.15);
    --text: #eef2ea; --text2: #9aab8e; --muted: #5f6e55;
    --border: rgba(127,204,63,0.1); --border2: rgba(127,204,63,0.25);
    --green: #4ade80; --yellow: #facc15; --red: #ef4444; --blue: #60a5fa;
  }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 1rem; }
  .container { max-width: 800px; margin: 0 auto; }
  .header { text-align: center; padding: 2rem 0 1.5rem; }
  .header h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.25rem; }
  .header h1 span { color: var(--accent); }
  .header .lead-id { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.35rem 1rem; border-radius: 100px; font-size: 0.75rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.5rem;
  }
  .status-badge.new { background: rgba(96,165,250,0.15); color: var(--blue); border: 1px solid rgba(96,165,250,0.3); }
  .status-badge.scheduled { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
  .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-badge.new .dot { background: var(--blue); }
  .status-badge.scheduled .dot { background: var(--green); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
  .card-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .card-title::before { content: ''; width: 20px; height: 1px; background: var(--accent); }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .info-item label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.15rem; }
  .info-item .val { font-size: 0.95rem; font-weight: 600; }
  .info-item .val.accent { color: var(--accent); }
  .info-item.full { grid-column: 1 / -1; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .action-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    background: var(--card); border: 1px solid var(--border2); border-radius: 12px;
    padding: 0.85rem; color: var(--text); text-decoration: none; font-size: 0.85rem;
    font-weight: 600; transition: all 0.2s; cursor: pointer; font-family: 'Outfit', sans-serif;
  }
  .action-btn:hover { background: var(--card2); transform: translateY(-1px); }
  .action-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .action-btn.primary:hover { box-shadow: 0 4px 20px rgba(127,204,63,0.3); }

  .route-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; }
  .route-card h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem; }
  .route-stat { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .route-stat:last-child { border: none; }
  .route-stat .label { color: var(--text2); }
  .route-stat .value { font-weight: 700; }
  .route-stat .value.green { color: var(--green); }
  .route-stat .value.yellow { color: var(--yellow); }
  .route-stat .value.red { color: var(--red); }

  .schedule-form { display: flex; flex-direction: column; gap: 1rem; }
  .schedule-form label { font-size: 0.8rem; color: var(--text2); font-weight: 600; }
  .schedule-form input, .schedule-form select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 0.85rem 1rem; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.9rem; outline: none;
  }
  .schedule-form input:focus, .schedule-form select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  .confirm-btn {
    width: 100%; background: var(--accent); color: var(--bg); padding: 1rem; border-radius: 12px;
    border: none; cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(127,204,63,0.3); }
  .confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .success-msg { display: none; text-align: center; padding: 2rem; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); border-radius: 12px; margin-top: 1rem; }
  .success-msg h3 { color: var(--green); font-size: 1.2rem; margin-bottom: 0.5rem; }
  .success-msg p { color: var(--text2); font-size: 0.9rem; }

  .loading { text-align: center; padding: 4rem; color: var(--text2); }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: 1fr; }
    .actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container" id="app">

</div>

<script>
// ═══════════════════════════════════════════════════════════════

  { name: "Spring Valley APT", lat: 41.3292, lng: -89.1988, day: "Friday", price: 60, time: 40 },

// ── Gas / drive assumptions ──
const MPG = 10;
const GAS_PRICE_PER_GALLON = 3.50;
const COST_PER_MILE = GAS_PRICE_PER_GALLON / MPG;
const AVG_SPEED_MPH = 25;

// ═══════════════════════════════════════════════════════════════

const leadId = window.location.pathname.split("/").pop();

async function loadLead() {
  try {
    const res = await fetch(`/api/lead/${leadId}`);
    if (!res.ok) throw new Error("Not found");
    const lead = await res.json();
    renderLead(lead);
  } catch (err) {
    document.getElementById("loadingState").innerHTML =
      '<h3 style="color:#ef4444;">Lead not found</h3><p style="color:var(--text2);">This link may have expired or is invalid.</p>';
  }
}

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 3959;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function findClosestCustomers(lat, lng, topN = 3) {
  const sorted = MY_CUSTOMERS.map(c => ({
    ...c, distance: getDistance(lat, lng, c.lat, c.lng)
  })).sort((a, b) => a.distance - b.distance);
  return sorted.slice(0, topN);
}

async function geocodeAddress(address) {
  try {
    const q = address.includes("IL") ? address : address + ", IL";
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
    const data = await res.json();
    if (data.length) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) { console.error("Geocode failed", e); }
  return null;
}

function renderLead(lead) {
  const fullName = `${lead.first_name} ${lead.last_name || ""}`.trim();
  const address = lead.address || "";
  const isScheduled = lead.status === "scheduled";

  const mapsLink = address ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address)}` : null;
  const propertyLink = address ? `https://www.google.com/maps/search/${encodeURIComponent(address)}` : null;
  const personSearchLink = `https://www.google.com/search?q=${encodeURIComponent(fullName + " " + (address || "Illinois Valley"))}`;
  const phoneLink = lead.phone ? `tel:${lead.phone}` : null;

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <h1>JUST<span>JUDDS</span> — Lead</h1>
      <div class="lead-id">ID: ${lead.id} &bull; ${lead.created_at ? new Date(lead.created_at).toLocaleDateString() : ""}</div>
    </div>

    <div style="text-align:center;">
      <div class="status-badge ${isScheduled ? 'scheduled' : 'new'}">
        <span class="dot"></span> ${isScheduled ? 'Scheduled' : 'New Lead'}
      </div>
    </div>

    <div class="card">
      <div class="card-title">Customer Info</div>
      <div class="info-grid">
        <div class="info-item"><label>Name</label><div class="val">${fullName}</div></div>
        <div class="info-item"><label>Phone</label><div class="val">${lead.phone || '<span style="color:var(--muted)">N/A</span>'}</div></div>
        <div class="info-item"><label>Email</label><div class="val">${lead.email}</div></div>
        <div class="info-item"><label>Service</label><div class="val accent">${lead.service || 'N/A'}</div></div>
        <div class="info-item full"><label>Property Address</label><div class="val">${address || '<span style="color:var(--muted)">Not provided</span>'}</div></div>
        <div class="info-item"><label>Estimate Pref</label><div class="val">${lead.estimate_pref || 'N/A'}</div></div>
        <div class="info-item"><label>Found Us Via</label><div class="val">${lead.heard_from || 'N/A'}</div></div>
        ${lead.notes ? `<div class="info-item full"><label>Notes</label><div class="val">${lead.notes}</div></div>` : ''}
      </div>
    </div>

    <div class="actions">
      ${phoneLink ? `<a href="${phoneLink}" class="action-btn primary">📞 Call ${lead.first_name}</a>` : '<div></div>'}
      <a href="${personSearchLink}" target="_blank" class="action-btn">🔍 Google ${lead.first_name}</a>
      ${mapsLink ? `<a href="${mapsLink}" target="_blank" class="action-btn primary">🗺️ Get Directions</a>` : '<div></div>'}
      ${propertyLink ? `<a href="${propertyLink}" target="_blank" class="action-btn">🏠 View Property</a>` : '<div></div>'}
    </div>

    ${address ? `
    <div class="card" id="routeCard">
      <div class="card-title">Route Analysis</div>
      <div id="routeAnalysis" style="color:var(--text2);font-size:0.85rem;">Calculating closest accounts...</div>
    </div>` : ''}

    ${!isScheduled ? `
    <div class="card" id="scheduleCard">
      <div class="card-title">Schedule Estimate</div>
      <div class="schedule-form">
        <div><label>Date</label><input type="date" id="schedDate" min="${new Date().toISOString().split('T')[0]}"></div>
        <div><label>Time</label><input type="time" id="schedTime" value="10:00"></div>
        <button class="confirm-btn" id="confirmBtn" onclick="confirmSchedule()">Confirm & Text ${lead.first_name} →</button>
      </div>
      <div class="success-msg" id="successMsg">
        <h3>✓ Estimate Scheduled!</h3>
        <p id="successDetail"></p>
      </div>
    </div>` : `
    <div class="card">
      <div class="card-title">Scheduled</div>
      <div class="info-grid">
        <div class="info-item"><label>Date</label><div class="val accent">${lead.scheduled_date || ''}</div></div>
        <div class="info-item"><label>Time</label><div class="val accent">${lead.scheduled_time || ''}</div></div>
      </div>
    </div>`}
  `;

  if (address) runRouteAnalysis(address);
}

async function runRouteAnalysis(address) {
  const coords = await geocodeAddress(address);
  const el = document.getElementById("routeAnalysis");
  if (!el) return;

  if (!coords) {
    el.innerHTML = '<span style="color:var(--red);">Could not geocode address.</span>';
    return;
  }

  const top3 = findClosestCustomers(coords.lat, coords.lng, 3);
  const closest = top3[0];
  if (!closest) { el.innerHTML = "No customers to compare."; return; }

  const dist = closest.distance;
  const roundTrip = dist * 2;
  const driveTimeMin = Math.round((dist / AVG_SPEED_MPH) * 60);
  const roundTripTime = driveTimeMin * 2;
  const gallonsUsed = roundTrip / MPG;
  const gasCost = gallonsUsed * GAS_PRICE_PER_GALLON;

  let distColor = dist < 2 ? "green" : dist < 5 ? "yellow" : "red";
  let costColor = gasCost < 2 ? "green" : gasCost < 4 ? "yellow" : "red";

  // Build top 3 nearest HTML
  let top3Html = top3.map((c, i) => `
    <div class="route-stat">
      <span class="label">${i+1}. ${c.name} (${c.day})</span>
      <span class="value ${c.distance < 2 ? 'green' : c.distance < 5 ? 'yellow' : 'red'}">${c.distance.toFixed(1)} mi</span>
    </div>
  `).join("");

  el.innerHTML = `
    <div class="route-card">
      <h4>📍 3 Nearest Accounts</h4>
      ${top3Html}
    </div>

    <div class="route-card">
      <h4>🚛 Drive Cost (Silverado @ ${MPG} mpg)</h4>
      <div class="route-stat">
        <span class="label">Round trip from ${closest.name}</span>
        <span class="value">${roundTrip.toFixed(1)} miles</span>
      </div>
      <div class="route-stat">
        <span class="label">Drive time (round trip @ ${AVG_SPEED_MPH}mph)</span>
        <span class="value">${roundTripTime} min</span>
      </div>
      <div class="route-stat">
        <span class="label">Gas (${gallonsUsed.toFixed(2)} gal @ $${GAS_PRICE_PER_GALLON}/gal)</span>
        <span class="value ${costColor}">$${gasCost.toFixed(2)}</span>
      </div>
    </div>

    <div class="route-card">
      <h4>💡 Recommendation</h4>
      <div style="font-size:0.85rem;color:var(--text2);line-height:1.6;">
        ${dist < 0.5 ?
          `<span style="color:var(--green);font-weight:700;">ON YOUR ROUTE</span> — This address is RIGHT next to ${closest.name}. Add to <strong>${closest.day}</strong> at Priority Zone pricing ($30). Basically zero extra cost.` :
        dist < 1.5 ?
          `<span style="color:var(--green);font-weight:700;">GREAT FIT</span> — Only ${dist.toFixed(1)} mi from ${closest.name}. Add to <strong>${closest.day}</strong>. $${gasCost.toFixed(2)} gas, ${roundTripTime} min extra. Priority/Nearby pricing.` :
        dist < 3 ?
          `<span style="color:var(--yellow);font-weight:700;">SOLID</span> — ${dist.toFixed(1)} mi from ${closest.name}. Recommend <strong>${closest.day}</strong>. $${gasCost.toFixed(2)} gas + ${roundTripTime} min. Nearby Zone pricing ($35).` :
        dist < 6 ?
          `<span style="color:var(--yellow);font-weight:700;">WORTH IT IF PRICED RIGHT</span> — ${dist.toFixed(1)} mi out. $${gasCost.toFixed(2)} gas + ${roundTripTime} min. Standard pricing ($40+). Best on <strong>${closest.day}</strong>.` :
          `<span style="color:var(--red);font-weight:700;">FAR OUT</span> — ${dist.toFixed(1)} mi from nearest account. $${gasCost.toFixed(2)} gas + ${roundTripTime} min. Price high ($45+) or wait for more accounts in this area.`
        }
      </div>
    </div>
  `;
}

async function confirmSchedule() {
  const date = document.getElementById("schedDate").value;
  const time = document.getElementById("schedTime").value;
  if (!date || !time) { alert("Pick a date and time"); return; }

  const btn = document.getElementById("confirmBtn");
  btn.textContent = "Scheduling...";
  btn.disabled = true;

  try {
    const res = await fetch("/api/schedule", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ lead_id: leadId, date, time }),
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById("scheduleCard").querySelector(".schedule-form").style.display = "none";
      document.getElementById("successMsg").style.display = "block";
      document.getElementById("successDetail").textContent = data.message + " — Customer has been texted!";
    } else {
      btn.textContent = "Error — Try Again"; btn.disabled = false;
    }
  } catch (err) {
    btn.textContent = "Error — Try Again"; btn.disabled = false;
  }
}

loadLead();
</script>
</body>
</html>
